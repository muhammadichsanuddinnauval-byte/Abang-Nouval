<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <link rel="stylesheet" href="styles.css">\n    <title>Digital Clock</title>\n</head>\n<body>\n    <div class="clock-container">\n        <h1>Digital Clock</h1>\n        <div id="clocks">\n            <div class="clock" id="utc">UTC: <span id="utc-time"></span></div>\n            <div class="clock" id="est">EST: <span id="est-time"></span></div>\n            <div class="clock" id="pst">PST: <span id="pst-time"></span></div>\n            <div class="clock" id="cet">CET: <span id="cet-time"></span></div>\n        </div>\n    </div>\n    <script src="script.js"></script>\n</body>\n</html>
