<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Digital Clock</title>
</head>
<body>
    <div class="clock-container">
        <h1>Digital Clock</h1>
        <div id="clocks">
            <div class="clock" id="utc">UTC: <span id="utc-time"></span></div>
            <div class="clock" id="est">EST: <span id="est-time"></span></div>
            <div class="clock" id="pst">PST: <span id="pst-time"></span></div>
            <div class="clock" id="cet">CET: <span id="cet-time"></span></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
